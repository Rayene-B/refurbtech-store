<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout</title>
  <style>
    :root {
      --bg: linear-gradient(135deg, #eef2ff, #f8fafc 40%, #fdf2f8);
      --card: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --border: rgba(148,163,184,0.35);
      --shadow: 0 20px 60px rgba(15,23,42,0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      padding: 28px;
    }
    .shell {
      width: min(1100px, 100%);
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 28px;
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) 320px;
      gap: 24px;
    }
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      gap: 16px;
    }
    .nav-btn,
    .ghost-btn,
    .remove-btn,
    .address-delete {
      cursor: pointer;
      border: 1px solid rgba(148,163,184,0.5);
      background: linear-gradient(180deg, #f8fafc, #f1f5f9);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 16px;
      font-weight: 700;
    }
    .items,
    .address-grid,
    .review-list {
      display: grid;
      gap: 14px;
    }
    .item,
    .address-card,
    .review-card,
    .checkout-section,
    .feedback-card,
    .summary {
      border: 1px solid var(--border);
      border-radius: 20px;
      background: linear-gradient(180deg, #ffffff, #f8fafc);
    }
    .item {
      padding: 14px;
      display: grid;
      grid-template-columns: 110px 1fr auto;
      gap: 16px;
      align-items: center;
    }
    .item img {
      width: 110px;
      height: 110px;
      object-fit: contain;
      border-radius: 14px;
      background: #fff;
    }
    .item h3,
    .checkout-section h2,
    .feedback-card h2,
    .summary h2 {
      margin: 0 0 8px;
    }
    .meta,
    .checkout-section p,
    .feedback-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }
    .item-actions,
    .address-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .qty-select,
    .currency-select,
    .address-form input,
    .feedback-comment {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid rgba(148,163,184,0.45);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
    }
    .qty-select {
      width: auto;
    }
    .feedback-comment {
      min-height: 110px;
      resize: vertical;
    }
    .price {
      font-size: 20px;
      font-weight: 800;
      text-align: right;
    }
    .summary {
      padding: 20px;
      height: fit-content;
    }
    .summary-row,
    .summary-total {
      display: flex;
      justify-content: space-between;
      margin: 12px 0;
    }
    .summary-total {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 20px;
      font-weight: 800;
    }
    .checkout-btn {
      width: 100%;
      margin-top: 18px;
      padding: 14px 18px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #eff6ff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 14px 28px rgba(37,99,235,0.24);
    }
    .hidden {
      display: none;
    }
    .empty {
      border: 1px dashed rgba(148,163,184,0.7);
      border-radius: 20px;
      padding: 28px;
      text-align: center;
      color: var(--muted);
      background: #fff;
    }
    .checkout-section,
    .feedback-card {
      margin-top: 20px;
      padding: 20px;
    }
    .address-card,
    .review-card {
      padding: 14px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
    }
    .address-card strong,
    .review-card strong {
      display: block;
      margin-bottom: 6px;
    }
    .address-form {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-top: 14px;
    }
    .stars {
      display: flex;
      gap: 8px;
      margin: 12px 0;
    }
    .star-btn {
      border: none;
      background: transparent;
      font-size: 28px;
      cursor: pointer;
      color: #cbd5e1;
      padding: 0;
    }
    .star-btn.active {
      color: #f59e0b;
    }
    .review-stars {
      color: #f59e0b;
      margin-bottom: 6px;
    }
    @media (max-width: 900px) {
      .shell {
        grid-template-columns: 1fr;
      }
      .item {
        grid-template-columns: 1fr;
        text-align: center;
      }
      .item img {
        margin: 0 auto;
      }
      .price {
        text-align: center;
      }
      .address-card,
      .review-card {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section>
      <div class="top-bar">
        <div>
          <h1>Your Bag</h1>
          <p id="bag-subtitle">Review your selected devices before checkout.</p>
        </div>
        <div class="item-actions">
          <button class="nav-btn" id="back-btn" type="button">Back</button>
          <button class="nav-btn" id="continue-shopping" type="button">Continue Shopping</button>
        </div>
      </div>
      <div class="items" id="bag-items"></div>

      <section class="checkout-section hidden" id="checkout-details">
        <h2>Delivery Address</h2>
        <p>Save delivery details here for checkout.</p>
        <p id="address-status"></p>
        <div class="address-grid" id="address-list"></div>
        <form class="address-form" id="address-form">
          <input type="text" id="address-country" placeholder="Country" required>
          <input type="text" id="address-city" placeholder="City" required>
          <input type="text" id="address-postcode" placeholder="Postcode" required>
          <input type="text" id="address-nearby" placeholder="Nearby place" required>
        </form>
        <div class="address-actions">
          <button class="checkout-btn" id="save-address" type="button">Save Address</button>
          <button class="ghost-btn" id="refresh-addresses" type="button">Refresh Addresses</button>
        </div>
      </section>

      <section class="feedback-card hidden" id="feedback-panel">
        <h2>Thank you for shopping with us</h2>
        <p>Please feel free to leave feedback on your experience today.</p>
        <div class="stars" id="feedback-stars">
          <button class="star-btn" type="button" data-value="1">★</button>
          <button class="star-btn" type="button" data-value="2">★</button>
          <button class="star-btn" type="button" data-value="3">★</button>
          <button class="star-btn" type="button" data-value="4">★</button>
          <button class="star-btn" type="button" data-value="5">★</button>
        </div>
        <textarea class="feedback-comment" id="feedback-comment" placeholder="Share your feedback"></textarea>
        <button class="checkout-btn" id="submit-feedback" type="button">Submit Feedback</button>
        <div class="review-list" id="review-list"></div>
      </section>
    </section>

    <aside class="summary">
      <h2>Order Summary</h2>
      <label for="currency-select">Currency</label>
      <select class="currency-select" id="currency-select">
        <option value="USD">USD</option>
        <option value="GBP">GBP</option>
        <option value="EUR">EUR</option>
        <option value="CNY">CNY</option>
        <option value="RUB">RUB</option>
      </select>
      <div class="summary-row"><span>Items</span><span id="summary-count">0</span></div>
      <div class="summary-row"><span>Shipping</span><span>Free</span></div>
      <div class="summary-total"><span>Total</span><span id="summary-total">USD 0.00</span></div>
      <button class="checkout-btn" id="proceed-to-checkout" type="button">Proceed to Checkout</button>
    </aside>
  </main>

  <button class="theme-toggle" id="theme-toggle" type="button">Light</button>
  <script src="backend-config.js"></script>
  <script src="ui-preferences.js"></script>
  <script>
    const bagStorageKey = 'refurbtech-bag';
    const reviewStorageKey = 'refurbtech-reviews';
    const bagItems = document.getElementById('bag-items');
    const summaryCount = document.getElementById('summary-count');
    const summaryTotal = document.getElementById('summary-total');
    const bagSubtitle = document.getElementById('bag-subtitle');
    const addressStatus = document.getElementById('address-status');
    const addressList = document.getElementById('address-list');
    const addressForm = document.getElementById('address-form');
    const saveAddressButton = document.getElementById('save-address');
    const refreshAddressesButton = document.getElementById('refresh-addresses');
    const checkoutDetails = document.getElementById('checkout-details');
    const feedbackPanel = document.getElementById('feedback-panel');
    const proceedToCheckoutButton = document.getElementById('proceed-to-checkout');
    const feedbackStars = document.querySelectorAll('#feedback-stars .star-btn');
    const feedbackComment = document.getElementById('feedback-comment');
    const submitFeedbackButton = document.getElementById('submit-feedback');
    const reviewList = document.getElementById('review-list');
    const currencySelect = document.getElementById('currency-select');
    const currencyRates = { USD: 1, GBP: 0.79, EUR: 0.92, CNY: 7.24, RUB: 92.5 };
    let selectedStars = 0;

    const getBag = () => {
      try {
        return JSON.parse(localStorage.getItem(bagStorageKey) || '[]');
      } catch {
        return [];
      }
    };
    const setBag = (items) => localStorage.setItem(bagStorageKey, JSON.stringify(items));
    const parsePrice = (value) => Number(String(value).replace(/[^0-9.]/g, '')) || 0;
    const getCurrency = () => localStorage.getItem('refurbtech-currency') || 'USD';
    const formatPrice = (amount) => {
      const currency = getCurrency();
      const converted = amount * (currencyRates[currency] || 1);
      return `${currency} ${converted.toFixed(2)}`;
    };
    const getReviews = () => {
      try {
        return JSON.parse(localStorage.getItem(reviewStorageKey) || '[]');
      } catch {
        return [];
      }
    };
    const setReviews = (reviews) => localStorage.setItem(reviewStorageKey, JSON.stringify(reviews));
    const renderReviews = () => {
      const reviews = getReviews();
      if (!reviews.length) {
        reviewList.innerHTML = '<div class="empty">No feedback yet. Be the first to leave a review.</div>';
        return;
      }
      reviewList.innerHTML = reviews.slice().reverse().map(review => `
        <article class="review-card">
          <div>
            <strong>${review.name}</strong>
            <div class="review-stars">${'★'.repeat(review.stars)}${'☆'.repeat(5 - review.stars)}</div>
            <p>${review.comment}</p>
          </div>
        </article>
      `).join('');
    };
    const paintStars = (value) => {
      feedbackStars.forEach(button => {
        const score = Number(button.getAttribute('data-value'));
        button.classList.toggle('active', score <= value);
      });
    };

    const renderBag = () => {
      const bag = getBag();
      const totalItems = bag.reduce((sum, item) => sum + (item.quantity || 1), 0);
      summaryCount.textContent = String(totalItems);
      const total = bag.reduce((sum, item) => sum + (parsePrice(item.price) * (item.quantity || 1)), 0);
      summaryTotal.textContent = formatPrice(total);

      if (!bag.length) {
        bagItems.innerHTML = '<div class="empty">Your bag is empty. Add a device from any category page to continue.</div>';
        bagSubtitle.textContent = 'Your bag is currently empty.';
        return;
      }

      bagSubtitle.textContent = 'Review your selected devices before checkout.';
      bagItems.innerHTML = bag.map(item => `
        <article class="item" data-key="${item.name}||${item.category}||${item.storage}||${item.color}">
          <img src="${item.image}" alt="${item.name}">
          <div>
            <h3>${item.name}</h3>
            <p class="meta">Category: ${item.category}</p>
            <p class="meta">Storage: ${item.storage}</p>
            <p class="meta">Color: ${item.color}</p>
            <div class="item-actions">
              <select class="qty-select" aria-label="Quantity">
                ${Array.from({ length: 10 }, (_, index) => {
                  const value = index + 1;
                  return `<option value="${value}" ${item.quantity === value ? 'selected' : ''}>${value}</option>`;
                }).join('')}
              </select>
              <button class="remove-btn" type="button">Remove</button>
            </div>
          </div>
          <div class="price">${formatPrice(parsePrice(item.price))}<br><span class="meta">Qty ${item.quantity || 1}</span></div>
        </article>
      `).join('');

      bagItems.querySelectorAll('.item').forEach(card => {
        const key = card.getAttribute('data-key');
        const qtySelect = card.querySelector('.qty-select');
        const removeBtn = card.querySelector('.remove-btn');

        qtySelect.addEventListener('change', () => {
          const updatedBag = getBag().map(item => {
            const itemKey = `${item.name}||${item.category}||${item.storage}||${item.color}`;
            if (itemKey === key) {
              return { ...item, quantity: Number(qtySelect.value) || 1 };
            }
            return item;
          });
          setBag(updatedBag);
          renderBag();
        });

        removeBtn.addEventListener('click', () => {
          const updatedBag = getBag().filter(item => `${item.name}||${item.category}||${item.storage}||${item.color}` !== key);
          setBag(updatedBag);
          renderBag();
        });
      });
    };

    const renderAddresses = (addresses) => {
      if (!addresses.length) {
        addressList.innerHTML = '<div class="empty">Saved addresses will appear here.</div>';
        return;
      }

      addressList.innerHTML = addresses.map(address => `
        <article class="address-card">
          <div>
            <strong>${address.city}, ${address.country}</strong>
            <p>Postcode: ${address.postcode}</p>
            <p>Nearby place: ${address.nearByPlace}</p>
          </div>
          <button class="address-delete" type="button" data-address-id="${address.id}">Delete</button>
        </article>
      `).join('');

      addressList.querySelectorAll('[data-address-id]').forEach(button => {
        button.addEventListener('click', async () => {
          const addressId = button.getAttribute('data-address-id');
          try {
            await window.RefurbBackend.apiFetch('java', `/delete/address/${addressId}`, {
              method: 'DELETE',
              json: false
            });
            await loadAddresses();
          } catch {
            addressStatus.textContent = '';
          }
        });
      });
    };

    const loadAddresses = async () => {
      if (!window.RefurbBackend.hasToken()) {
        addressList.innerHTML = '<div class="empty">Saved addresses will appear here.</div>';
        return;
      }

      try {
        const addresses = await window.RefurbBackend.apiFetch('java', '/get/all/address', {
          method: 'GET',
          json: false
        });
        renderAddresses(Array.isArray(addresses) ? addresses : []);
      } catch {
        addressList.innerHTML = '<div class="empty">Saved addresses will appear here.</div>';
      }
    };

    saveAddressButton.addEventListener('click', async () => {
      if (!window.RefurbBackend.hasToken() || !addressForm.reportValidity()) {
        return;
      }

      const payload = {
        country: document.getElementById('address-country').value.trim(),
        city: document.getElementById('address-city').value.trim(),
        postcode: document.getElementById('address-postcode').value.trim(),
        nearByPlace: document.getElementById('address-nearby').value.trim()
      };

      try {
        await window.RefurbBackend.apiFetch('java', '/add/address', {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        addressForm.reset();
        addressStatus.textContent = 'Address saved.';
        await loadAddresses();
      } catch {
        addressStatus.textContent = '';
      }
    });

    refreshAddressesButton.addEventListener('click', loadAddresses);
    currencySelect.value = getCurrency();
    currencySelect.addEventListener('change', () => {
      localStorage.setItem('refurbtech-currency', currencySelect.value);
      renderBag();
    });
    feedbackStars.forEach(button => {
      button.addEventListener('click', () => {
        selectedStars = Number(button.getAttribute('data-value'));
        paintStars(selectedStars);
      });
    });
    submitFeedbackButton.addEventListener('click', () => {
      if (!selectedStars) return;
      const session = JSON.parse(localStorage.getItem('refurbtech-session') || 'null');
      const reviews = getReviews();
      reviews.push({
        name: session?.user?.username || session?.user?.email || 'Guest user',
        stars: selectedStars,
        comment: feedbackComment.value.trim() || 'No written comment provided.'
      });
      setReviews(reviews);
      feedbackComment.value = '';
      selectedStars = 0;
      paintStars(0);
      renderReviews();
    });
    proceedToCheckoutButton.addEventListener('click', () => {
      checkoutDetails.classList.remove('hidden');
      feedbackPanel.classList.remove('hidden');
      checkoutDetails.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    document.getElementById('back-btn').addEventListener('click', () => {
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = 'mainscreen.html';
      }
    });
    document.getElementById('continue-shopping').addEventListener('click', () => {
      window.location.href = 'mainscreen.html';
    });

    renderBag();
    loadAddresses();
    renderReviews();
  </script>
</body>
</html>
