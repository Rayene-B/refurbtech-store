<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login/Signup Page</title>
    <style>
        :root {
            --bg: #f4f4f4;
            --card: #ffffff;
            --text: #0f172a;
            --muted: #475569;
            --border: #ccc;
            --shadow: 0 0 10px rgba(0,0,0,0.1);
            --primary: #4CAF50;
            --primary-hover: #45a049;
        }
        body.dark {
            --bg: #0b1220;
            --card: #0f172a;
            --text: #e2e8f0;
            --muted: #cbd5e1;
            --border: #1f2937;
            --shadow: 0 10px 30px rgba(0,0,0,0.45);
            --primary: #22c55e;
            --primary-hover: #16a34a;
        }
        body {
            font-family: Arial, sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--text);
        }
        .container {
            background-color: var(--card);
            padding: 20px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            width: 300px;
        }
        h2 {
            text-align: center;
        }
        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: #fff;
            color: var(--text);
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background-color: var(--primary-hover); }
        .toggle {
            text-align: center;
            margin-top: 10px;
        }
        .toggle a {
            color: var(--primary);
            text-decoration: none;
        }
        .message {
            text-align: center;
            margin-top: 10px;
            color: red;
        }
        .success { color: #16a34a; }
        .theme-toggle {
            position: fixed;
            left: 18px;
            bottom: 18px;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            box-shadow: 0 10px 24px rgba(15,23,42,0.16);
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="login-form">
            <h2>Login</h2>
            <input type="email" id="login-email" placeholder="Email" required>
            <input type="password" id="login-password" placeholder="Password" required>
            <button onclick="login()">Login</button>
            <div class="toggle">
                <a href="#" onclick="showSignup()">Don't have an account? Sign up</a>
            </div>
        </div>
        <div id="signup-form" style="display: none;">
            <h2>Sign Up</h2>
            <input type="email" id="signup-email" placeholder="Email" required>
            <input type="password" id="signup-password" placeholder="Password" required>
            <button onclick="signup()">Sign Up</button>
            <div class="toggle">
                <a href="#" onclick="showLogin()">Already have an account? Login</a>
            </div>
        </div>
        <div id="message" class="message"></div>
    </div>
    <button class="theme-toggle" id="theme-toggle" type="button">🌞 Light</button>

    <script>
        function showSignup() {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('signup-form').style.display = 'block';
            clearMessage();
        }

        function showLogin() {
            document.getElementById('signup-form').style.display = 'none';
            document.getElementById('login-form').style.display = 'block';
            clearMessage();
        }

        function clearMessage() {
            document.getElementById('message').innerText = '';
            document.getElementById('message').className = 'message';
        }

        function showMessage(msg, isSuccess = false) {
            const messageDiv = document.getElementById('message');
            messageDiv.innerText = msg;
            messageDiv.className = isSuccess ? 'message success' : 'message';
        }

        function signup() {
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;

            if (!email || !password) {
                showMessage('Please fill in all fields.');
                return;
            }

            let users = JSON.parse(localStorage.getItem('users')) || {};

            if (users[email]) {
                showMessage('Account already exists with this email.');
                return;
            }

            users[email] = { password: password, signupDate: new Date().toISOString(), logins: [] };
            localStorage.setItem('users', JSON.stringify(users));
            showMessage('Account created successfully! Redirecting to main screen...', true);
            setTimeout(() => { window.location.href = 'mainscreen.html'; }, 2000);
        }

        function login() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            if (!email || !password) {
                showMessage('Please fill in all fields.');
                return;
            }

            let users = JSON.parse(localStorage.getItem('users')) || {};

            if (users[email] && typeof users[email] === 'string') {
                users[email] = { password: users[email], signupDate: new Date().toISOString(), logins: [] };
                localStorage.setItem('users', JSON.stringify(users));
            }

            if (!users[email]) {
                showMessage('No account found with this email. Please sign up.');
                return;
            }

            if (users[email].password !== password) {
                showMessage('Incorrect password.');
                return;
            }

            users[email].logins.push(new Date().toISOString());
            localStorage.setItem('users', JSON.stringify(users));
            showMessage('Login successful! Redirecting to main screen...', true);
            setTimeout(() => { window.location.href = 'mainscreen.html'; }, 2000);
        }

        // theme toggle
        const toggleBtn = document.getElementById('theme-toggle');
        const applyTheme = (mode) => {
            document.body.classList.toggle('dark', mode === 'dark');
            toggleBtn.textContent = mode === 'dark' ? '🌙 Dark' : '🌞 Light';
            localStorage.setItem('theme', mode);
        };
        const stored = localStorage.getItem('theme') || 'light';
        applyTheme(stored);
        toggleBtn.addEventListener('click', () => {
            const next = document.body.classList.contains('dark') ? 'light' : 'dark';
            applyTheme(next);
        });
    </script>
</body>
</html>
