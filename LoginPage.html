<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        :root {
            --bg: #f4f4f4;
            --card: #ffffff;
            --text: #0f172a;
            --muted: #475569;
            --border: #cbd5e1;
            --shadow: 0 10px 30px rgba(15,23,42,0.12);
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
        }
        body.dark {
            --bg: #0b1220;
            --card: #0f172a;
            --text: #e2e8f0;
            --muted: #cbd5e1;
            --border: #334155;
            --shadow: 0 10px 30px rgba(0,0,0,0.45);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg);
            color: var(--text);
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            padding: 24px;
        }
        .container {
            width: min(440px, 100%);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 26px;
        }
        .top-row {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 8px;
        }
        .back-btn {
            width: auto;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: linear-gradient(180deg, #f8fafc, #f1f5f9);
            color: var(--text);
            box-shadow: none;
        }
        h1 {
            margin: 0 0 8px;
            text-align: center;
            font-size: 30px;
        }
        .subtitle {
            margin: 0 0 18px;
            text-align: center;
            color: var(--muted);
        }
        h2 {
            margin: 0 0 10px;
            font-size: 18px;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            margin: 10px 0;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: #fff;
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
        }
        body.dark input {
            background: #111827;
        }
        button {
            width: 100%;
            padding: 12px 14px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: #eff6ff;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background: var(--primary-hover); }
        .toggle {
            margin-top: 14px;
            text-align: center;
        }
        .toggle a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        .message {
            text-align: center;
            margin-top: 14px;
            color: #dc2626;
        }
        .success {
            color: #16a34a;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-row">
            <button class="back-btn" type="button" onclick="goBack()">Back</button>
        </div>
        <h1>Welcome Back</h1>
        <p class="subtitle">Log in or create an account to continue shopping.</p>

        <div id="login-form">
            <h2>Login</h2>
            <input type="email" id="login-email" placeholder="Email" required>
            <input type="password" id="login-password" placeholder="Password" required>
            <button onclick="login()">Login</button>
            <div class="toggle">
                <a href="#" onclick="showSignup()">Don't have an account? Sign up</a>
            </div>
        </div>

        <div id="signup-form" style="display: none;">
            <h2>Sign Up</h2>
            <input type="text" id="signup-username" placeholder="Username" required>
            <input type="email" id="signup-email" placeholder="Email" required>
            <input type="password" id="signup-password" placeholder="Password" required>
            <button onclick="signup()">Create Account</button>
            <div class="toggle">
                <a href="#" onclick="showLogin()">Already have an account? Login</a>
            </div>
        </div>

        <div id="message" class="message"></div>
    </div>

    <button class="theme-toggle" id="theme-toggle" type="button">Light</button>

    <script src="backend-config.js"></script>
    <script src="ui-preferences.js"></script>
    <script>
        const sessionStorageKey = 'refurbtech-session';

        function showSignup() {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('signup-form').style.display = 'block';
            clearMessage();
        }

        function showLogin() {
            document.getElementById('signup-form').style.display = 'none';
            document.getElementById('login-form').style.display = 'block';
            clearMessage();
        }

        function clearMessage() {
            const messageDiv = document.getElementById('message');
            messageDiv.innerText = '';
            messageDiv.className = 'message';
        }

        function showMessage(message, isSuccess = false) {
            const messageDiv = document.getElementById('message');
            messageDiv.innerText = message;
            messageDiv.className = isSuccess ? 'message success' : 'message';
        }

        async function signup() {
            const username = document.getElementById('signup-username').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value;

            if (!username || !email || !password) {
                showMessage('Please fill in all fields.');
                return;
            }

            const config = window.RefurbBackend.getConfig();

            try {
                const response = await fetch(window.RefurbBackend.buildUrl(config.authBaseUrl, '/signup'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const payload = await response.json();
                if (!response.ok) {
                    showMessage(payload.message || 'Sign up failed.');
                    return;
                }

                localStorage.setItem(sessionStorageKey, JSON.stringify(payload));
                showMessage('', true);
                setTimeout(() => { window.location.href = 'mainscreen.html'; }, 1000);
            } catch {
                showMessage('Unable to create account right now.');
            }
        }

        async function login() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            if (!email || !password) {
                showMessage('Please fill in all fields.');
                return;
            }

            const config = window.RefurbBackend.getConfig();

            try {
                const response = await fetch(window.RefurbBackend.buildUrl(config.authBaseUrl, '/login'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const payload = await response.json();
                if (!response.ok) {
                    showMessage(payload.message || 'Login failed.');
                    return;
                }

                localStorage.setItem(sessionStorageKey, JSON.stringify(payload));
                showMessage('', true);
                setTimeout(() => { window.location.href = 'mainscreen.html'; }, 1000);
            } catch {
                showMessage('Unable to log in right now.');
            }
        }

        function goBack() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = 'mainscreen.html';
            }
        }
    </script>
</body>
</html>
