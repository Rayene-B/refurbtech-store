
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RefurbTech</title>
  <style>
    :root {
      --bg: linear-gradient(135deg, #eef2ff, #f8fafc 40%, #fdf2f8);
      --card: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --accent: #e5e7eb;
      --accent-strong: #cbd5e1;
      --accent-dark: #0f172a;
      --brand: #2563eb;
      --shadow: 0 20px 60px rgba(15,23,42,0.08);
    }
    body.dark {
      --bg: radial-gradient(circle at 10% 20%, #111827, #0b1220 50%, #0b1220);
      --card: #0f172a;
      --text: #e2e8f0;
      --muted: #cbd5e1;
      --accent: #1f2937;
      --accent-strong: #111827;
      --accent-dark: #e2e8f0;
      --brand: #60a5fa;
      --shadow: 0 20px 60px rgba(0,0,0,0.45);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    }
    .page-wrap {
      width: min(1100px, 94vw);
      display: grid;
      gap: 18px;
      justify-items: center;
    }
    .shell {
      width: 100%;
      padding: 42px 38px 34px;
      background: var(--card);
      border: 1px solid rgba(148,163,184,0.35);
      border-radius: 18px;
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .nav-btn {
      cursor: pointer;
      border: 1px solid rgba(148,163,184,0.6);
      background: linear-gradient(180deg, #f8fafc, #f1f5f9);
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 600;
      color: #0f172a;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      letter-spacing: 0.2px;
      color: var(--accent-dark);
    }
    .brand-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--brand);
      box-shadow: 0 0 0 6px rgba(37,99,235,0.12);
    }
    .hero {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-bottom: 18px;
    }
    .search-shell {
      position: relative;
      margin: -10px auto 8px;
      width: min(720px, 100%);
    }
    .search-input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid rgba(148,163,184,0.45);
      border-radius: 14px;
      background: #fff;
      color: var(--text);
      font-size: 15px;
    }
    .search-results {
      position: absolute;
      top: calc(100% + 10px);
      left: 0;
      right: 0;
      display: none;
      gap: 10px;
      padding: 12px;
      border: 1px solid rgba(148,163,184,0.35);
      border-radius: 16px;
      background: var(--card);
      box-shadow: var(--shadow);
      z-index: 15;
    }
    .search-results.show {
      display: grid;
    }
    .search-result {
      display: grid;
      grid-template-columns: 56px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 10px;
      border: 1px solid rgba(148,163,184,0.3);
      border-radius: 12px;
      background: linear-gradient(180deg, #f8fafc, #f1f5f9);
      color: inherit;
      text-decoration: none;
    }
    .search-result img {
      width: 56px;
      height: 56px;
      object-fit: contain;
      border-radius: 10px;
      background: #fff;
    }
    .search-result strong {
      display: block;
      margin-bottom: 2px;
    }
    .search-result span {
      font-size: 13px;
      color: var(--muted);
    }
    .search-empty {
      padding: 14px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed rgba(148,163,184,0.55);
      border-radius: 12px;
    }
    .store-name {
      margin: 0;
      font-size: clamp(42px, 7vw, 76px);
      line-height: 0.92;
      letter-spacing: 0.6px;
      color: var(--accent-dark);
      text-align: center;
      font-weight: 900;
      text-wrap: balance;
    }
    h1 {
      margin: 0;
      font-size: clamp(26px, 4vw, 34px);
      letter-spacing: 0.4px;
    }
    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 15px;
    }
    .buttons {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;
    }
    button {
      cursor: pointer;
      display: inline-flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      gap: 12px;
      padding: 0;
      border: 1px solid rgba(148,163,184,0.6);
      border-radius: 12px;
      background: linear-gradient(180deg, #f8fafc, #f1f5f9);
      color: #0f172a;
      font-size: 16px;
      letter-spacing: 0.2px;
      transition: transform 150ms ease, box-shadow 150ms ease, border-color 150ms ease;
      backdrop-filter: blur(4px);
      overflow: hidden;
    }
    button:hover {
      transform: translateY(-2px);
      border-color: rgba(148,163,184,0.9);
      box-shadow: 0 12px 28px rgba(15,23,42,0.12);
    }
    button:active {
      transform: translateY(0);
      border-color: var(--accent-strong);
      box-shadow: 0 8px 18px rgba(15,23,42,0.14);
    }
    .banner {
      width: 100%;
      height: 230px;
      object-fit: cover;
      display: block;
    }
    .button-body {
      padding: 20px 20px 22px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: flex-start;
    }
    .button-body span:first-child {
      font-size: 17px;
      font-weight: 700;
      color: #0f172a;
    }
    .meta {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      font-size: 13px;
      color: #0f172a;
    }
    .theme-toggle {
      position: fixed;
      left: 18px;
      bottom: 18px;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid var(--accent);
      background: var(--card);
      color: var(--text);
      box-shadow: 0 10px 24px rgba(15,23,42,0.16);
      cursor: pointer;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="search-shell">
      <input class="search-input" id="global-search" type="text" placeholder="Search any product">
      <div class="search-results" id="global-search-results"></div>
    </div>
    <p class="store-name">GARAD's Refurb Tech</p>
    <main class="shell">
      <div class="top-bar">
        <button class="nav-btn" id="back-btn" type="button">Back</button>
        <div class="brand"><span class="brand-dot"></span>RefurbTech</div>
        <span></span>
      </div>

      <div class="hero">
        <div>
          <h1>Pick your category</h1>
          <p class="subtitle">Curated, refurbished tech with up to 2-year warranty.</p>
        </div>
      </div>
      <div class="buttons">
        <button type="button" data-target="phones.html">
          <img class="banner" src="phones banner.png" alt="Phones banner">
          <div class="button-body">
            <span>Phones</span>
            <span class="meta">12 models</span>
          </div>
        </button>
        <button type="button" data-target="laptops.html">
          <img class="banner" src="laptops banner.png" alt="Laptops banner">
          <div class="button-body">
            <span>Laptops</span>
            <span class="meta">8 models</span>
          </div>
        </button>
        <button type="button" data-target="consoles.html">
          <img class="banner" src="consoles banner.png" alt="Consoles banner">
          <div class="button-body">
            <span>Consoles</span>
            <span class="meta">10 models</span>
          </div>
        </button>
      </div>
    </main>
  </div>
  <button class="theme-toggle" id="theme-toggle" type="button">🌞 Light</button>
  <script src="catalog.js"></script>
  <script src="ui-preferences.js"></script>
  <script>
    // Redirect any element with data-target to its matching page
    document.querySelectorAll('[data-target]').forEach(btn => {
      btn.addEventListener('click', () => {
        const target = btn.getAttribute('data-target');
        if (target) {
          window.location.href = target;
        }
      });
    });
    const globalSearch = document.getElementById('global-search');
    const globalSearchResults = document.getElementById('global-search-results');
    const renderSearchResults = (query) => {
      const results = window.searchRefurbCatalog(query);
      if (!query.trim()) {
        globalSearchResults.classList.remove('show');
        globalSearchResults.innerHTML = '';
        return;
      }
      if (!results.length) {
        globalSearchResults.classList.add('show');
        globalSearchResults.innerHTML = '<div class="search-empty">Item not found</div>';
        return;
      }
      globalSearchResults.classList.add('show');
      globalSearchResults.innerHTML = results.map(item => `
        <a class="search-result" href="${item.page}?search=${encodeURIComponent(item.name)}">
          <img src="${item.image}" alt="${item.name}">
          <div>
            <strong>${item.name}</strong>
            <span>${item.category} • ${item.brand}</span>
          </div>
          <span>Open</span>
        </a>
      `).join('');
    };
    globalSearch.addEventListener('input', () => {
      renderSearchResults(globalSearch.value);
    });
    document.addEventListener('click', (event) => {
      if (!event.target.closest('.search-shell')) {
        globalSearchResults.classList.remove('show');
      }
    });
    document.getElementById('back-btn').addEventListener('click', () => {
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = 'LoginPage.html';
      }
    });
    const toggleBtn = document.getElementById('theme-toggle');
    const applyTheme = (mode) => {
      document.body.classList.toggle('dark', mode === 'dark');
      toggleBtn.textContent = mode === 'dark' ? '🌙 Dark' : '🌞 Light';
      localStorage.setItem('theme', mode);
    };
    const stored = localStorage.getItem('theme') || 'light';
    applyTheme(stored);
    toggleBtn.addEventListener('click', () => {
      const next = document.body.classList.contains('dark') ? 'light' : 'dark';
      applyTheme(next);
    });
  </script>
</body>
</html>
